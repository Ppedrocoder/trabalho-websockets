<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Canvas Colaborativo</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

<header>
  <div class="logo">canvas</div>
  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="status-txt">conectando…</span>
  </div>
</header>

<canvas id="canvas"></canvas>

<footer>
  <span class="label">Cor</span>
  <div class="paleta" id="paleta"></div>
  <span class="label" style="margin-left:8px">Pincel</span>
  <div class="tamanhos" id="tamanhos"></div>
  <button class="btn-limpar" onclick="limparTela()">Limpar tela</button>
</footer>

<div id="log"></div>

<script src="./index.js">
</script>

</body>
</html>
